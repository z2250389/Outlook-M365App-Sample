<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サイドバーランチャー</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://res.cdn.office.net/teams-js/2.34.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
  <script src="shared.js" defer></script>
  <script src="index.js" defer></script>
</head>
<body>
  <main class="launcher-shell">
    <section id="fallback-panel" class="launcher-panel" hidden>
      <p class="eyebrow">Outlook / Microsoft 365</p>
      <h1>サイドバーランチャー</h1>
      <p id="tab-status" class="status">開けませんでした</p>
      <p class="hint">新しいブラウザウィンドウを開けない場合だけ、下のボタンを使ってください。</p>
      <p class="link-row"><a id="tab-link" href="#" target="_blank" rel="noreferrer">-</a></p>
      <div>
        <button id="open-button" type="button">開く</button>
      </div>
    </section>
  </main>
</body>
</html>
