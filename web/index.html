<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sidebar Launcher</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://res.cdn.office.net/teams-js/2.34.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
  <script src="shared.js" defer></script>
  <script src="index.js" defer></script>
</head>
<body>
  <main class="shell">
    <section class="card">
      <p class="eyebrow">Outlook / Microsoft 365</p>
      <h1>Minimal starter</h1>
      <p id="tab-status" class="status">Loading</p>
      <dl class="meta">
        <div>
          <dt>Title</dt>
          <dd id="tab-title">-</dd>
        </div>
        <div>
          <dt>Target</dt>
          <dd><a id="tab-link" href="#" target="_blank" rel="noreferrer">-</a></dd>
        </div>
        <div>
          <dt>Mode</dt>
          <dd id="tab-mode">-</dd>
        </div>
        <div>
          <dt>Dialog size</dt>
          <dd id="tab-size">-</dd>
        </div>
      </dl>
      <div id="manual-row" hidden>
        <button id="open-button" type="button">Open dialog</button>
      </div>
    </section>
  </main>
</body>
</html>
