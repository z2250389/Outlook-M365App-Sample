<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sidebar Launcher</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://res.cdn.office.net/teams-js/2.34.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
  <script src="shared.js" defer></script>
  <script src="dialog.js" defer></script>
</head>
<body>
  <main class="dialog-shell">
    <header class="dialog-header">
      <div>
        <p class="eyebrow">Dialog</p>
        <h1 id="dialog-title">Web view</h1>
      </div>
      <p id="dialog-status" class="status">Loading</p>
    </header>
    <section class="dialog-body">
      <iframe
        id="target-frame"
        class="target-frame"
        title="Target web view"
        loading="eager"
      ></iframe>
      <p class="fallback">
        If the target does not render here,
        <a id="fallback-link" href="#" target="_blank" rel="noreferrer">target</a>
        can be opened in the browser.
      </p>
    </section>
  </main>
</body>
</html>
